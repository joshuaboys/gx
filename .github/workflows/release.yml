name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build release asset (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

      - name: Build native binary
        run: bun run build

      - name: Name release asset
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -s)" in
            Linux) os=linux ;;
            Darwin) os=darwin ;;
            *) echo "Unsupported OS: $(uname -s)" >&2; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64) arch=x64 ;;
            arm64|aarch64) arch=aarch64 ;;
            *) echo "Unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          mv gx "gx-${os}-${arch}"
          echo "asset=gx-${os}-${arch}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.asset }}
          path: ${{ env.asset }}
          if-no-files-found: error

  publish:
    name: Publish checksummed release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksum manifest
        working-directory: dist
        run: sha256sum gx-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/gx-* dist/SHA256SUMS --clobber

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/gx-*
            dist/SHA256SUMS
