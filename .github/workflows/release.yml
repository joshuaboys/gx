name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build release asset (${{ matrix.asset }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            asset: gx-linux-x64
          - runner: ubuntu-24.04-arm
            asset: gx-linux-aarch64
          - runner: macos-13
            asset: gx-darwin-x64
          - runner: macos-14
            asset: gx-darwin-aarch64
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@1.75
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Type check
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Build native binary
        run: cargo build --release --workspace

      - name: Name release asset
        shell: bash
        run: |
          set -euo pipefail
          cp target/release/gx "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish checksummed release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksum manifest
        working-directory: dist
        run: sha256sum gx-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/gx-* dist/SHA256SUMS --clobber

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/gx-*
            dist/SHA256SUMS
