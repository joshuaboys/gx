name: Release

permissions:
  contents: write
  id-token: write
  attestations: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gx-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: gx-linux-aarch64
            linker: aarch64-linux-gnu-gcc
            apt: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gx-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gx-darwin-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross linker
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build release binary
        env:
          # Point cargo at the cross linker for the aarch64-linux target; a
          # no-op for native targets where `linker` is unset.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
        run: cargo build --release --locked --target ${{ matrix.target }} -p gx

      - name: Stage release asset
        shell: bash
        run: |
          set -euo pipefail
          cp "target/${{ matrix.target }}/release/gx" "${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish checksummed release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create checksum manifest
        working-directory: dist
        run: sha256sum gx-* > SHA256SUMS

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            dist/gx-* dist/SHA256SUMS --clobber

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/gx-*
            dist/SHA256SUMS
