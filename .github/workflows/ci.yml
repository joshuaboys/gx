name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Test & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun run build

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.75
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      # The parity harness in crates/gx/tests/parity.rs spawns the TS gx
      # binary to verify the Rust port's snapshot contract. Build it here so
      # cargo test can find it at the workspace root.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build TS binary for parity tests
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release --workspace
