name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Test & Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      # `cargo test` runs the unit tests, the smoke test, and the behaviour
      # parity snapshot tests (crates/gx/tests/snapshots.rs) against the Rust
      # binary, asserting it matches the committed goldens.
      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release --workspace
